<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Presentation</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Centered slide container */
    .frame-container {
      width: 80%;
      max-width: 1200px;
      aspect-ratio: 16 / 9;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      transition: opacity 0.4s ease-in-out;
    }

    /* Navigation buttons */
    .nav {
      position: fixed;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #38BDF8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    /* Slide number */
    .slide-number {
      position: fixed;
      top: 15px;
      right: 25px;
      color: white;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div class="slide-number" id="slideNumber">Slide 1 / 12</div>

<div class="frame-container">
  <iframe id="frame" src="slide1.html"></iframe>
</div>

<div class="nav">
  <button onclick="prevSlide()">⬅ Prev</button>
  <button onclick="nextSlide()">Next ➡</button>
</div>

<script>
  const slides = [
    "slide1.html","slide2.html","slide3.html","slide4.html",
    "slide5.html","slide6.html","slide7.html","slide8.html",
    "slide9.html","slide10.html","slide11.html","slide12.html"
  ];

  let index = 0;
  const frame = document.getElementById("frame");
  const slideNumber = document.getElementById("slideNumber");

  function updateSlide() {
    frame.style.opacity = 0;

    setTimeout(() => {
      frame.src = slides[index];
      slideNumber.innerText = `Slide ${index + 1} / 12`;
      frame.style.opacity = 1;
    }, 200);
  }

  function nextSlide() {
    if (index < slides.length - 1) {
      index++;
      updateSlide();
    }
  }

  function prevSlide() {
    if (index > 0) {
      index--;
      updateSlide();
    }
  }

  /* Keyboard navigation */
  document.addEventListener("keydown", function(e) {
    if (e.key === "ArrowRight") nextSlide();
    if (e.key === "ArrowLeft") prevSlide();
  });

  /* Click anywhere → next slide */
  document.addEventListener("click", function(e) {
    if (!e.target.closest("button")) {
      nextSlide();
    }
  });

</script>

</body>
</html>
